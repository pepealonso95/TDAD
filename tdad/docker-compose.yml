services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '[]'
      NEO4J_db_transaction_timeout: "600s"
      NEO4J_server_memory_heap_initial__size: "2g"
      NEO4J_server_memory_heap_max__size: "4g"
      NEO4J_dbms_memory_transaction_total_max: "0"
      NEO4J_db_memory_transaction_total_max: "0"
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
